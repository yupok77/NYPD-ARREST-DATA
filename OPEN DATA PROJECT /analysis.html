<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width">

  <title>NYPD Arrest Analysis</title>

  <link href="style.css" rel="stylesheet">
  <link href="c3.css" rel="stylesheet">

  <script src="d3.js"></script>
<script src="c3.js"></script>
<script src="analysis.js"></script>
</head>

<body onload="init()">

  <nav class="container center">
    <a href="index.html">Home</a>
    <a href="info.html">Information</a>
    <a href="analysis.html">Analysis</a>
  </nav>

  <div id="banner" class="container center banner">
    <div>
      <h1>NYPD Arrest Analysis</h1>
      <p class="subtitle">
        Explore arrest trends using charts
      </p>
    </div>
  </div>

  <div class="container">
    <p>
      This page analyzes NYPD arrest data. Select a chart type and
      display arrests by borough or age group.
    </p>
  </div>

  <div class="container center">

    <select id="chartType">
      <option value="bar">Bar</option>
      <option value="pie">Pie</option>
      <option value="donut">Donut</option>
      <option value="line">Line</option>
    </select>

    <a class="button" onclick="arrestsByBorough()">
      Borough Analysis
    </a>

    <a class="button" onclick="arrestsByAge()">
      Age Group Analysis
    </a>

  </div>

  <div class="container">
    <p id="discussion"></p>
  </div>

  <div id="output"></div>

  <div id="footer" class="container center">
    <p>NYPD Arrests Data Project</p>
  </div>

</body>

</html>
